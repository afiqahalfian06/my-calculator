<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Definite Integral Calculator</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f7fb;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h2 {
            margin-top: 0;
            color: #1e293b;
            text-align: center;
        }

        .workspace {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 25px;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .workspace {
                grid-template-columns: 1fr;
            }
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #f8fafc;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
        }

        input {
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
            transition: border 0.2s;
        }

        input:focus {
            border-color: #3b82f6;
        }

        .result-box {
            margin-top: 10px;
            padding: 15px;
            background: #e0f2fe;
            border-left: 5px solid #0284c7;
            border-radius: 4px;
        }

        .result-title {
            font-size: 0.85rem;
            color: #0369a1;
            font-weight: bold;
            text-transform: uppercase;
        }

        .result-value {
            font-size: 1.4rem;
            font-weight: bold;
            color: #0c4a6e;
            margin-top: 5px;
        }

        .canvas-container {
            position: relative;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            background: #fafafa;
        }

        .error {
            color: #dc2626;
            font-size: 0.85rem;
            margin-top: 5px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Definite Integral Visualizer</h2>
    
    <div class="workspace">
        <div class="controls">
            <div class="input-group">
                <label for="functionInput">Function f(x)</label>
                <input type="text" id="functionInput" value="x^2 - 7*x + 12" placeholder="e.g., x^2 - 4">
                <div id="errorMsg" class="error">Invalid math expression</div>
            </div>

            <div class="input-group">
                <label for="lowerBound">Lower Bound (a)</label>
                <input type="number" id="lowerBound" value="5" step="any">
            </div>

            <div class="input-group">
                <label for="upperBound">Upper Bound (b)</label>
                <input type="number" id="upperBound" value="6" step="any">
            </div>

            <div class="result-box">
                <div class="result-title">Calculated Area</div>
                <div class="result-value" id="areaResult">0.00</div>
            </div>
        </div>

        <div class="canvas-container">
            <canvas id="graphCanvas" width="500" height="400"></canvas>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('graphCanvas');
    const ctx = canvas.getContext('2d');

    // Input elements
    const functionInput = document.getElementById('functionInput');
    const lowerInput = document.getElementById('lowerBound');
    const upperInput = document.getElementById('upperBound');
    const areaResult = document.getElementById('areaResult');
    const errorMsg = document.getElementById('errorMsg');

    // Graph viewport configuration configurations
    const config = {
        minX: -2,
        maxX: 10,
        minY: -5,
        maxY: 15
    };

    // Safely parse user math strings into JavaScript math functions
    function parseFunction(str) {
        // Replace algebraic notations like x^2 with Math.pow notation, and handles standard Math symbols
        let parsed = str
            .replace(/deg/g, '*(Math.PI/180)')
            .replace(/(\d+)(x)/g, '$1*$2') // 2x -> 2*x
            .replace(/x\^(\d+(\.\d+)?)/g, 'Math.pow(x,$1)') // x^2 -> Math.pow(x,2)
            .replace(/x\^x/g, 'Math.pow(x,x)')
            .replace(/sin/g, 'Math.sin')
            .replace(/cos/g, 'Math.cos')
            .replace(/tan/g, 'Math.tan')
            .replace(/exp/g, 'Math.exp')
            .replace(/ln/g, 'Math.log')
            .replace(/pi/g, 'Math.PI')
            .replace(/e/g, 'Math.E');
            
        // Basic safety fallback if string has unauthorized characters
        if (/[^a-zA-Z0-9+\-*/\s().,^]/.test(str)) {
            throw new Error("Invalid characters");
        }
        
        return new Function('x', `try { return ${parsed}; } catch(e) { return NaN; }`);
    }

    // Convert Graph coordinate space to Canvas pixel space
    function toCanvasX(graphX) {
        return ((graphX - config.minX) / (config.maxX - config.minX)) * canvas.width;
    }

    function toCanvasY(graphY) {
        return canvas.height - (((graphY - config.minY) / (config.maxY - config.minY)) * canvas.height);
    }

    // Core drawing logic
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        errorMsg.style.display = 'none';

        let f;
        try {
            f = parseFunction(functionInput.value);
            // Test execution to make sure function doesn't instantly crash
            f(1); 
        } catch (e) {
            errorMsg.style.display = 'block';
            return;
        }

        const a = parseFloat(lowerInput.value) || 0;
        const b = parseFloat(upperInput.value) || 0;

        // Automatically adjust graph view range loosely around bounds for usability
        const margin = Math.max(2, Math.abs(b - a) * 0.5);
        config.minX = Math.min(a, b) - margin;
        config.maxX = Math.max(a, b) + margin;

        // Auto-detect a reasonable scale for Y coordinate based on evaluated values
        let samples = [];
        for(let i=0; i<=100; i++) {
            let xEval = config.minX + (i/100)*(config.maxX - config.minX);
            let yEval = f(xEval);
            if(!isNaN(yEval) && isFinite(yEval)) samples.push(yEval);
        }
        if(samples.length > 0) {
            config.minY = Math.min(...samples, -2) - 2;
            config.maxY = Math.max(...samples, 2) + 2;
        }

        // Draw Axes Grid
        ctx.strokeStyle = '#e2e8f0';
        ctx.lineWidth = 1;
        
        // Horizontal line origin grid indicator
        const yZero = toCanvasY(0);
        ctx.beginPath();
        ctx.moveTo(0, yZero); ctx.lineTo(canvas.width, yZero);
        ctx.strokeStyle = '#cbd5e1';
        ctx.stroke();

        // Vertical line origin grid indicator
        const xZero = toCanvasX(0);
        ctx.beginPath();
        ctx.moveTo(xZero, 0); ctx.lineTo(xZero, canvas.height);
        ctx.stroke();

        // Integrate via Midpoint Riemann Sum rule (1000 subintervals)
        const n = 1000;
        const dx = (b - a) / n;
        let totalArea = 0;

        // Draw shaded Integration Area bounds
        ctx.fillStyle = 'rgba(59, 130, 246, 0.3)';
        ctx.beginPath();
        
        let startedAreaPath = false;
        const stepSize = (b - a) / 200; // Resolution optimization for shading polygon

        for (let i = 0; i <= 200; i++) {
            let xVal = a + i * stepSize;
            let yVal = f(xVal);
            
            if (!isNaN(yVal) && isFinite(yVal)) {
                let cx = toCanvasX(xVal);
                let cy = toCanvasY(yVal);
                if (!startedAreaPath) {
                    ctx.moveTo(toCanvasX(a), toCanvasY(0));
                    startedAreaPath = true;
                }
                ctx.lineTo(cx, cy);
            }
        }
        if (startedAreaPath) {
            ctx.lineTo(toCanvasX(b), toCanvasY(0));
            ctx.closePath();
            ctx.fill();
        }

        // Numerical calculation Loop
        for (let i = 0; i < n; i++) {
            let midX = a + (i + 0.5) * dx;
            let yVal = f(midX);
            if (!isNaN(yVal) && isFinite(yVal)) {
                totalArea += yVal * dx;
            }
        }
        areaResult.textContent = totalArea.toFixed(4);

        // Draw Plot Line
        ctx.strokeStyle = '#2563eb';
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        
        let startedPlot = false;
        for (let pixelX = 0; pixelX < canvas.width; pixelX++) {
            let graphX = config.minX + (pixelX / canvas.width) * (config.maxX - config.minX);
            let graphY = f(graphX);

            if (!isNaN(graphY) && isFinite(graphY)) {
                let pixelY = toCanvasY(graphY);
                if (!startedPlot) {
                    ctx.moveTo(pixelX, pixelY);
                    startedPlot = true;
                } else {
                    ctx.lineTo(pixelX, pixelY);
                }
            }
        }
        ctx.stroke();

        // Draw vertical bounding limits a and b
        ctx.strokeStyle = '#ef4444';
        ctx.lineWidth = 1.5;
        ctx.setLineDash([4, 4]);

        ctx.beginPath();
        ctx.moveTo(toCanvasX(a), 0); ctx.lineTo(toCanvasX(a), canvas.height);
        ctx.moveTo(toCanvasX(b), 0); ctx.lineTo(toCanvasX(b), canvas.height);
        ctx.stroke();
        ctx.setLineDash([]); // clear dash adjustments
    }

    // Attach real-time event listeners
    [functionInput, lowerInput, upperInput].forEach(element => {
        element.addEventListener('input', draw);
    });

    // Initial Execution
    draw();
</script>

</body>
</html>
